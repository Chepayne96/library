<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Library</title>
</head>
<body>
    <div class="mainContainer">
        <div class="topBarContainer">
            <button type="button" class="addBook" id="openModal">Add Book</button>
            <button type="button" class="refresh">Refresh</button>
            <dialog class="modalContainer">
                <modal class="modal">
                    <legend><h3>Add a book to your library</h3></legend>
                    <form method="dialog" class="form">
                        <label for="author" class="author">Author:</label>
                        <input type="text" name="author" id="authorVal">

                        <label for="title" class="title">Title:</label>
                        <input type="text" name="title" id="titleVal">

                        <label for="pages" class="pages">Number of Pages:</label>
                        <input type="number" name="pages" id="pagesVal">

                        <div class="radioRead">
                            <legend>Have you read this book</legend>
                            <input type="radio" name="read" id="haveRead" value="Read">
                            <label for="haveRead">Have Read</label>
                            <input type="radio" name="read" id="haveRead" value="Not Read">
                            <label for="notRead">Not Read</label>
                        </div>

                        <button type="button" id="submitBook">Add to Library</button>
                    </form>
                </modal>
            </dialog>
        </div>
        <div class="bodyContainer">
        </div>
    <script src="script.js"></script>
</body>
</html>
